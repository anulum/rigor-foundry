# RigorFoundry — Semgrep policy

rules:
  - id: rigor-foundry-no-shell-true
    message: subprocess execution must not enable a shell
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)
  - id: rigor-foundry-no-eval
    message: dynamic eval is outside the bounded policy-expression contract
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)
