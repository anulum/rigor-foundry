# RigorFoundry — Read-only audit container

services:
  rigor:
    build:
      context: .
    image: rigor-foundry:local
    command: ["scan", "--root", "/workspace"]
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    volumes:
      - type: bind
        source: ${AUDIT_REPOSITORY:?set AUDIT_REPOSITORY to the repository path}
        target: /workspace
        read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
