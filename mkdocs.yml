# RigorFoundry — Documentation configuration

site_name: RigorFoundry
site_description: Evidence-bound codebase transformation
site_url: https://anulum.github.io/rigor-foundry/
repo_url: https://github.com/anulum/rigor-foundry
exclude_docs: |
  internal/

theme:
  name: material
  logo: assets/anulum_logo.png
  favicon: assets/anulum_logo_company.jpg
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - First repository: getting-started.md
  - Consumer integrations: integrations.md
  - Architecture: architecture.md
  - Digest dependencies: digest-dependencies.md
  - Source provenance: source-provenance.md
  - CLI: cli.md
  - Built-in adapter profiles: adapter-profiles.md
  - Application-security rules: application-security-rules.md
  - Reliability rules: reliability-rules.md
  - SARIF export: sarif.md
  - Compliance maps and OSCAL: compliance-maps.md
  - Assisted-review drafting: assisted-review.md
  - Claim isolation and fleet views: claim-isolation.md
  - Cross-repository campaigns: cross-repository-campaigns.md
  - Adapter catalogue: adapter-catalogue.md
  - Remediation execution: remediation-executor.md
  - Polyglot capability matrix: polyglot-capability-matrix.md
  - Public API stability: api-stability.md
  - Configuration: configuration.md
  - Validation: validation.md
  - Security: security.md
