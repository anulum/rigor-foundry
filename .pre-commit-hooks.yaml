# RigorFoundry — distributable adopter hook

- id: rigor-foundry
  name: RigorFoundry evidence gate
  description: Run the read-only staged evidence gate in observe mode.
  entry: rigor
  args:
    - gate
    - --root
    - .
    - --policy
    - rigor-foundry-policy.json
    - --mode
    - observe
    - --scope
    - staged
  language: python
  additional_dependencies:
    - cryptography==49.0.0
    - cffi==2.1.0
    - pycparser==3.0
  pass_filenames: false
  always_run: true
  require_serial: true
