# RigorFoundry — REUSE configuration

version = 1

[[annotations]]
path = [
    "*.md",
    "*.txt",
    "COPYRIGHT",
    ".github/**/*.md",
    "docs/**/*.md",
    "docs/assets/*",
    "LICENSES/Apache-2.0.txt",
    "NOTICE",
    "requirements/*.txt",
    "src/rigor_foundry/py.typed",
]
SPDX-FileCopyrightText = "1996-2026 Miroslav Šotek"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = [
    ".zenodo.json",
    ".github/**/*.json",
    "coverage-residuals.json",
    "rigor-foundry-policy.json",
]
SPDX-FileCopyrightText = "1996-2026 Miroslav Šotek"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = ["**/__pycache__/*"]
precedence = "override"
SPDX-FileCopyrightText = "1996-2026 Miroslav Šotek"
SPDX-License-Identifier = "Apache-2.0"
