# RigorFoundry — Generated release-note categories

changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Security
      labels: [security]
    - title: Breaking changes
      labels: [breaking-change]
    - title: Features and remediation
      labels: [enhancement, remediation]
    - title: Architecture and audit contracts
      labels: [architecture, audit, governance]
    - title: Dependencies and operations
      labels: [dependencies, ci, container]
    - title: Documentation
      labels: [documentation]
    - title: Other changes
      labels: ["*"]
