# RigorFoundry — Defect report form

name: Defect report
description: Report reproducible incorrect behaviour without including secrets.
title: "fix: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Security vulnerabilities must follow SECURITY.md instead of this form.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Provide the exact version or full commit SHA.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the minimal repository shape and command sequence with sensitive values removed.
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Linux, macOS, Windows, Other]
    validations:
      required: true
