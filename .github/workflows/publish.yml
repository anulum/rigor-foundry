# RigorFoundry — Protected OIDC package publication

name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing published v* release tag to publish
        required: true
        type: string
      confirm_public_pypi:
        description: Confirm irreversible publication to public PyPI
        required: true
        type: choice
        options:
          - refuse
          - publish

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  pypi:
    if: >-
      github.actor == github.repository_owner &&
      github.event.repository.private == false &&
      (
        (github.event_name == 'release' &&
         github.event.action == 'published') ||
        (github.event_name == 'workflow_dispatch' &&
         inputs.confirm_public_pypi == 'publish' &&
         (
           (github.ref_type == 'tag' &&
            github.ref_name == inputs.release_tag) ||
           (github.ref_type == 'branch' &&
            github.ref_name == github.event.repository.default_branch)
         ))
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/project/rigor-foundry/
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Validate published release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          published_tag=$(
            gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --json isDraft,publishedAt,tagName \
              --jq 'select(.isDraft == false and .publishedAt != null) | .tagName'
          )
          test "$published_tag" = "$RELEASE_TAG"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: refs/tags/${{ github.event.release.tag_name || inputs.release_tag }}
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Build and validate distributions
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m tools.check_release_tag "$RELEASE_TAG"
          python -m build --no-isolation
          python -m tools.check_distribution_metadata dist/*.whl
          python -m twine check dist/*
          test "$(find dist -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 1
          test "$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 1
          python -m venv --clear /tmp/rigor-foundry-package-smoke
          /tmp/rigor-foundry-package-smoke/bin/python -m pip install \
            --require-hashes -r requirements/runtime.txt
          /tmp/rigor-foundry-package-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/rigor-foundry-package-smoke/bin/python -m pip check
          /tmp/rigor-foundry-package-smoke/bin/rigor --help >/dev/null
          python -m pip hash dist/*.whl dist/*.tar.gz
      - uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
          release-signing-artifacts: false
      - name: Isolate signing bundles
        run: |
          set -euo pipefail
          mkdir --mode=0700 signing-bundles
          bundle_count=$(find dist -maxdepth 1 -type f -name '*.sigstore.json' | wc -l)
          test "$bundle_count" -eq 2
          mv dist/*.sigstore.json signing-bundles/
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 2
      - name: Attach signing bundles
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          bundle_count=$(
            find signing-bundles -maxdepth 1 -type f -name '*.sigstore.json' | wc -l
          )
          test "$bundle_count" -eq 2
          gh release upload "$RELEASE_TAG" signing-bundles/*.sigstore.json \
            --clobber \
            --repo "$GITHUB_REPOSITORY"
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/*
      - uses: ./.github/actions/pypi-publish
        with:
          packages-dir: dist/
          print-hash: true
