# RigorFoundry — Protected OIDC package publication

name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  pypi:
    if: >-
      github.event_name == 'release' &&
      github.event.release.author.login == github.repository_owner &&
      github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/project/rigor-foundry/
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Build and validate distributions
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m tools.check_release_tag "$RELEASE_TAG"
          python -m build --no-isolation
          python -m twine check dist/*
      - uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/*
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
          print-hash: true
