# RigorFoundry — OpenSSF Scorecard evidence

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "31 4 * * 2"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/actions/scorecard
        with:
          results_file: results.sarif
          results_format: sarif
          # The scorecard action is vendored as a digest-pinned local Docker action,
          # so the OpenSSF web-app cannot verify a direct `ossf/scorecard-action`
          # job reference and rejects publication. Keep the SARIF upload to GitHub
          # code scanning and disable the incompatible public-registry publish.
          publish_results: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scorecard-results
          path: results.sarif
          if-no-files-found: error
          retention-days: 14
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        if: github.event.repository.private == false
        with:
          sarif_file: results.sarif
