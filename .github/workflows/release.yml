# RigorFoundry — Tagged GitHub release assembly

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Build release artifacts
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m tools.check_release_tag "$GITHUB_REF_NAME"
          python -m build --no-isolation
          python -m twine check dist/*
          python -m venv --without-pip /tmp/rigor-sbom
          SBOM_SITE=$(/tmp/rigor-sbom/bin/python -c 'import sysconfig; print(sysconfig.get_paths()["purelib"])')
          python -m zipfile -e dist/*.whl "$SBOM_SITE"
          cyclonedx-py environment /tmp/rigor-sbom/bin/python \
            --pyproject pyproject.toml --mc-type library --output-reproducible \
            --output-file dist/rigor-foundry.cdx.json
          sha256sum dist/* > dist/SHA256SUMS
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
