# RigorFoundry — Hook parity gate

name: Pre-commit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hooks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install hook environment
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --require-hashes -r requirements/ci.txt
          .venv/bin/python -m pip install --no-build-isolation --no-deps .
      - run: .venv/bin/python -m pre_commit run --all-files --show-diff-on-failure
