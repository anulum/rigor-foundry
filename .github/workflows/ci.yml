# RigorFoundry — Deterministic quality and test gates

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install native audit sandbox
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap
          sudo install -m 0644 /dev/stdin /etc/apparmor.d/bwrap <<'APPARMOR'
          abi <abi/4.0>,
          include <tunables/global>

          # Ubuntu 24.04 globally mediates unprivileged user namespaces. This
          # attachment grants userns only to the root-owned bwrap path; it does
          # not provide the native-audit sandbox. RigorFoundry's attested bwrap
          # argument contract provides that boundary and disables nested userns.
          profile bwrap /usr/bin/bwrap flags=(unconfined) {
            userns,
          }
          APPARMOR
          sudo apparmor_parser --replace /etc/apparmor.d/bwrap
          test "$(/usr/bin/cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns)" = 1
          /usr/bin/bwrap --version
          /usr/bin/dpkg-query --show \
            --showformat='${binary:Package}|${Version}|${Architecture}|${Status}\n' \
            bubblewrap
          /usr/bin/bwrap --die-with-parent --new-session --unshare-all \
            --unshare-user --disable-userns --assert-userns-disabled \
            --uid 65534 --gid 65534 --ro-bind /usr /usr \
            --symlink usr/bin /bin --symlink usr/lib /lib \
            --symlink usr/lib64 /lib64 --proc /proc --dev /dev \
            --tmpfs /tmp --clearenv -- /usr/bin/true
          if /usr/bin/bwrap --die-with-parent --new-session --unshare-all \
            --unshare-user --disable-userns --assert-userns-disabled \
            --uid 65534 --gid 65534 --ro-bind /usr /usr \
            --symlink usr/bin /bin --symlink usr/lib /lib \
            --symlink usr/lib64 /lib64 --proc /proc --dev /dev \
            --tmpfs /tmp --clearenv -- \
            /usr/bin/unshare --user -- /usr/bin/true; then
            echo "nested user namespace unexpectedly succeeded" >&2
            exit 1
          fi
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install hash-locked quality environment
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Audit repository contracts
        run: python -m tools.audit
      - name: Validate classified coverage residuals
        run: python -m rigor_foundry residuals-check --root .
      - name: Lint and format
        run: |
          python -m ruff check src tests tools
          python -m ruff format --check src tests tools
      - name: Strict typing
        run: python -m mypy --strict src/rigor_foundry tools
      - name: Static security
        run: python -m bandit -q -c pyproject.toml -r src/rigor_foundry tools
      - name: Licence conformance
        run: python -m reuse lint
      - name: Run repository self-audit and native controls
        run: |
          python -m rigor_foundry scan --root . --policy rigor-foundry-policy.json --json-out self-audit-report.json --markdown-out self-audit-report.md
          python -m rigor_foundry gate --root . --policy rigor-foundry-policy.json --mode observe --scope full --allow-native-audits --output self-audit-gate.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: repository-self-audit
          path: |
            self-audit-report.json
            self-audit-report.md
            self-audit-gate.json
          if-no-files-found: error
          retention-days: 30

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install native audit sandbox
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap
          sudo install -m 0644 /dev/stdin /etc/apparmor.d/bwrap <<'APPARMOR'
          abi <abi/4.0>,
          include <tunables/global>

          # Ubuntu 24.04 globally mediates unprivileged user namespaces. This
          # attachment grants userns only to the root-owned bwrap path; it does
          # not provide the native-audit sandbox. RigorFoundry's attested bwrap
          # argument contract provides that boundary and disables nested userns.
          profile bwrap /usr/bin/bwrap flags=(unconfined) {
            userns,
          }
          APPARMOR
          sudo apparmor_parser --replace /etc/apparmor.d/bwrap
          test "$(/usr/bin/cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns)" = 1
          /usr/bin/bwrap --version
          /usr/bin/dpkg-query --show \
            --showformat='${binary:Package}|${Version}|${Architecture}|${Status}\n' \
            bubblewrap
          /usr/bin/bwrap --die-with-parent --new-session --unshare-all \
            --unshare-user --disable-userns --assert-userns-disabled \
            --uid 65534 --gid 65534 --ro-bind /usr /usr \
            --symlink usr/bin /bin --symlink usr/lib /lib \
            --symlink usr/lib64 /lib64 --proc /proc --dev /dev \
            --tmpfs /tmp --clearenv -- /usr/bin/true
          if /usr/bin/bwrap --die-with-parent --new-session --unshare-all \
            --unshare-user --disable-userns --assert-userns-disabled \
            --uid 65534 --gid 65534 --ro-bind /usr /usr \
            --symlink usr/bin /bin --symlink usr/lib /lib \
            --symlink usr/lib64 /lib64 --proc /proc --dev /dev \
            --tmpfs /tmp --clearenv -- \
            /usr/bin/unshare --user -- /usr/bin/true; then
            echo "nested user namespace unexpectedly succeeded" >&2
            exit 1
          fi
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/test.txt
      - name: Install hash-locked test environment
        run: |
          python -m pip install --require-hashes -r requirements/test.txt
          python -m pip install --no-build-isolation --no-deps .
      - name: Run exhaustive CI-owned suite
        run: >-
          python -m pytest tests -q
          --cov=rigor_foundry --cov-branch
          --cov-report=term-missing --cov-report=xml
          --cov-fail-under=95
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: matrix.python-version == '3.12'
        with:
          name: coverage-python-3.12
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

  distribution:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Build and check distributions
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m build --no-isolation
          python -m tools.check_distribution_metadata dist/*.whl
          python -m twine check dist/*
      - name: Smoke installed wheel outside checkout
        run: |
          python -m venv /tmp/rigor-wheel
          /tmp/rigor-wheel/bin/python -m pip install --require-hashes -r requirements/runtime.txt
          /tmp/rigor-wheel/bin/python -m pip install --no-deps dist/*.whl
          cd /tmp
          /tmp/rigor-wheel/bin/rigor --help
          /tmp/rigor-wheel/bin/rigor --version
          /tmp/rigor-wheel/bin/python -c 'import rigor_foundry as package; from rigor_foundry.api_stability import public_api_contract_errors, public_api_manifest; assert public_api_contract_errors(package.__all__, vars(package)) == (); assert public_api_manifest()["schema_version"] == "1.1"'
          rm -rf /tmp/rigor-source-e2e
          mkdir /tmp/rigor-source-e2e
          cd /tmp/rigor-source-e2e
          printf '%s\n' '{"advisory":{"affected":true}}' > source-payload.json
          /tmp/rigor-wheel/bin/python -c 'from pathlib import Path; from rigor_foundry import ExternalSourceClaim, SourceRetrievalPolicy, source_provenance_to_json; policy = SourceRetrievalPolicy.build(allowed_hosts=("advisories.example.test",), allow_cross_origin_redirects=False, maximum_redirects=0, timeout_seconds=5, maximum_bytes=1024, allowed_media_types=("application/json",), freshness_seconds=3600); claim = ExternalSourceClaim.build(claim_id="cve-2026-52869-affected", kind="advisory", subject="CVE-2026-52869", predicate="affected", expected_value=True, source_uri="https://advisories.example.test/CVE-2026-52869.json", extraction_method="json-pointer", selector="/advisory/affected"); Path("source-policy.json").write_text(source_provenance_to_json(policy), encoding="utf-8"); Path("source-claim.json").write_text(source_provenance_to_json(claim), encoding="utf-8")'
          /tmp/rigor-wheel/bin/rigor source-capture --policy source-policy.json --payload source-payload.json --requested-uri https://advisories.example.test/CVE-2026-52869.json --final-uri https://advisories.example.test/CVE-2026-52869.json --redirect-count 0 --http-status 200 --media-type application/json --retrieved-at 2026-07-17T08:00:00Z --retriever-name curl --retriever-version 8.10.1 --retriever-executable-digest aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa --output source-capture.json
          /tmp/rigor-wheel/bin/rigor source-verify --claim source-claim.json --capture source-capture.json --payload source-payload.json --verified-at 2026-07-17T08:30:00Z --verifier distribution/smoke --output source-verification.json
          /tmp/rigor-wheel/bin/python -c 'import json; from pathlib import Path; from rigor_foundry import SourceVerification; verification = SourceVerification.from_dict(json.loads(Path("source-verification.json").read_text(encoding="utf-8"))); assert verification.verified_value is True'
          rm -rf /tmp/rigor-adopter
          mkdir -p /tmp/rigor-adopter/src /tmp/rigor-adopter/tests /tmp/rigor-adopter/docs/internal
          git -C /tmp/rigor-adopter init --initial-branch=main
          git -C /tmp/rigor-adopter config user.name "Distribution Smoke"
          git -C /tmp/rigor-adopter config user.email "distribution-smoke@example.invalid"
          printf '%s\n' 'docs/internal/' > /tmp/rigor-adopter/.gitignore
          printf '%s\n' 'VALUE = 1' > /tmp/rigor-adopter/src/example.py
          printf '%s\n' 'def test_value() -> None:' '    assert True' > /tmp/rigor-adopter/tests/test_example.py
          git -C /tmp/rigor-adopter add .gitignore src tests
          git -C /tmp/rigor-adopter commit -m "test: seed installed-wheel adopter"
          cd /tmp/rigor-adopter
          /tmp/rigor-wheel/bin/rigor bootstrap --root . --policy rigor-foundry-policy.json --todo docs/internal/TODO.md --review-ledger docs/internal/reviews.json --source-root src --test-root tests
          git add rigor-foundry-policy.json
          git commit -m "test: track installed-wheel adopter policy"
          /tmp/rigor-wheel/bin/rigor scan --root . --policy rigor-foundry-policy.json --json-out /tmp/rigor-adopter-report.json
          /tmp/rigor-wheel/bin/rigor sarif --report /tmp/rigor-adopter-report.json --output /tmp/rigor-adopter-results.sarif
          /tmp/rigor-wheel/bin/python -c 'import json, pathlib; document = json.loads(pathlib.Path("/tmp/rigor-adopter-results.sarif").read_text(encoding="utf-8")); assert document["version"] == "2.1.0"; assert document["runs"][0]["results"]'
          curl --proto '=https' --tlsv1.2 --fail --location --output /tmp/sarif-schema-2.1.0.json https://docs.oasis-open.org/sarif/sarif/v2.1.0/errata01/os/schemas/sarif-schema-2.1.0.json
          printf '%s  %s\n' c3b4bb2d6093897483348925aaa73af03b3e3f4bd4ca38cef26dcb4212a2682e /tmp/sarif-schema-2.1.0.json | sha256sum --check --strict
          python -c 'import json, pathlib; from jsonschema import Draft4Validator; schema = json.loads(pathlib.Path("/tmp/sarif-schema-2.1.0.json").read_text(encoding="utf-8")); document = json.loads(pathlib.Path("/tmp/rigor-adopter-results.sarif").read_text(encoding="utf-8")); Draft4Validator.check_schema(schema); Draft4Validator(schema).validate(document)'
          test "$(stat -c '%a' docs/internal/TODO.md)" = 600
          test ! -e docs/internal/reviews.json
          set +e
          /tmp/rigor-wheel/bin/rigor bootstrap --root . --policy rigor-foundry-policy.json --todo docs/internal/TODO.md --review-ledger docs/internal/reviews.json --source-root src --test-root tests >/dev/null 2>&1
          second_status=$?
          set -e
          test "$second_status" = 2
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rigor-foundry-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 14
