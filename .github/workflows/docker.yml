# RigorFoundry — Container build, smoke, and tagged publication

name: Container

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - run: docker build --tag rigor-foundry:ci .
      - name: Create host-owned Git fixture
        run: |
          git init --initial-branch=main /tmp/rigor-container-target
          git -C /tmp/rigor-container-target config user.name "RigorFoundry Smoke"
          git -C /tmp/rigor-container-target config user.email audit-tests@example.invalid
          cp README.md /tmp/rigor-container-target/README.md
          git -C /tmp/rigor-container-target add README.md
          git -C /tmp/rigor-container-target commit -m "test: container fixture"
      - name: Scan fixture through non-root read-only container
        run: >-
          docker run --rm --read-only --cap-drop ALL
          --security-opt no-new-privileges
          --mount type=bind,src=/tmp/rigor-container-target,dst=/workspace,readonly
          rigor-foundry:ci scan --root /workspace
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: rigor-foundry:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  publish:
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      github.actor == github.repository_owner &&
      github.event.repository.private == false
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: container-release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Validate exact release tag
        run: python -m tools.check_release_tag "$GITHUB_REF_NAME"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ghcr.io/anulum/rigor-foundry
          tags: |
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
