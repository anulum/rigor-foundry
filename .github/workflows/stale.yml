# RigorFoundry — Non-destructive stale-item labelling

name: Stale triage

on:
  schedule:
    - cron: "13 5 * * 4"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: stale-triage
  cancel-in-progress: false

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899
        with:
          days-before-stale: 60
          days-before-close: -1
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: This issue has had no recent activity; please confirm whether its evidence is still current.
          stale-pr-message: This pull request has had no recent activity; please rebase and refresh its verification evidence.
