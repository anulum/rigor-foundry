# RigorFoundry — Non-destructive stale-item labelling

name: Stale triage

on:
  schedule:
    - cron: "13 5 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stale-triage
  cancel-in-progress: false

jobs:
  stale:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629
        with:
          days-before-stale: 60
          days-before-close: -1
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: This issue has had no recent activity; please confirm whether its evidence is still current.
          stale-pr-message: This pull request has had no recent activity; please rebase and refresh its verification evidence.
